# beacon2/render.yaml
# Render "Infrastructure as Code" file.
# Connect your GitHub repo in Render and it will read this file automatically.
# Docs: https://render.com/docs/infrastructure-as-code

services:
  # ── Backend API ──────────────────────────────────────────────────────────
  - type: web
    name: beacon2-backend
    runtime: node
    region: frankfurt          # EU region — required for GDPR
    plan: free                 # Change to 'starter' when moving to production
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/app.js
    healthCheckPath: /health

    envVars:
      # Render automatically injects DATABASE_URL from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: beacon2-db
          property: connectionString

      # Generate these two secrets at https://generate-secret.now.sh/64
      # Paste the values into Render's dashboard after first deploy
      - key: JWT_ACCESS_SECRET
        sync: false            # Render will prompt you to fill this in

      - key: JWT_REFRESH_SECRET
        sync: false

      # For POC: Redis is disabled. Set to 'false' to skip Redis calls.
      - key: USE_REDIS
        value: "false"

      - key: NODE_ENV
        value: production

      - key: PORT
        value: "3001"

      - key: JWT_ACCESS_EXPIRES_IN
        value: "15m"

      - key: JWT_REFRESH_EXPIRES_DAYS
        value: "30"

      - key: BCRYPT_ROUNDS
        value: "12"

      # Set this after Vercel deploys the frontend (paste your Vercel URL)
      - key: CORS_ORIGIN
        sync: false

# ── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: beacon2-db
    region: frankfurt          # Must match the backend region
    plan: free                 # Free tier — fine for POC
    databaseName: beacon2
    user: beacon2
