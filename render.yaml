# beacon2/render.yaml

services:
  - type: web
    name: beacon2-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node src/app.js
    healthCheckPath: /health

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beacon2-db
          property: connectionString

      - key: JWT_ACCESS_SECRET
        sync: false        # Paste a random 64-char string in the Render dashboard

      - key: JWT_REFRESH_SECRET
        sync: false        # Paste a DIFFERENT random 64-char string

      - key: SEED_ADMIN_EMAIL
        value: "admin@beacon2.local"   # Change to your preferred admin email

      - key: SEED_ADMIN_PASSWORD
        sync: false        # Paste your chosen admin password here — set this before first deploy

      - key: USE_REDIS
        value: "false"

      - key: NODE_ENV
        value: production

      - key: PORT
        value: "3001"

      - key: JWT_ACCESS_EXPIRES_IN
        value: "15m"

      - key: JWT_REFRESH_EXPIRES_DAYS
        value: "30"

      - key: BCRYPT_ROUNDS
        value: "12"

      - key: CORS_ORIGIN
        sync: false        # Paste your Vercel frontend URL here

databases:
  - name: beacon2-db
    region: frankfurt
    plan: free
    databaseName: beacon2
    user: beacon2
