# beacon2/.github/workflows/e2e.yml
# End-to-end user acceptance tests — run against a live staging deployment.
#
# Trigger options:
#   • Manually from the GitHub Actions tab (workflow_dispatch)
#   • Automatically after the staging deploy succeeds (repository_dispatch)
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   BEACON2_BASE_URL             — frontend URL  e.g. https://beacon2.onrender.com
#   BEACON2_API_URL              — backend URL   e.g. https://beacon2-api.onrender.com
#   BEACON2_SYSADMIN_USERNAME    — system-admin username
#   BEACON2_SYSADMIN_PASSWORD    — system-admin password
#   BEACON2_TEST_ADMIN_PASSWORD  — password for the dedicated E2E test tenant admin
#
# Optional secrets (defaults are fine for most setups):
#   BEACON2_TEST_TENANT_SLUG     — default: e2etest
#   BEACON2_TEST_TENANT_NAME     — default: E2E Test u3a
#   BEACON2_TEST_ADMIN_USERNAME  — default: testadmin
#   BEACON2_TEST_ADMIN_NAME      — default: Test Administrator
#   BEACON2_TEST_ADMIN_EMAIL     — default: testadmin@beacon2-e2e.invalid

name: E2E tests

on:
  # Run manually from the Actions tab at any time
  workflow_dispatch:

  # Uncomment to run automatically when a push lands on main
  # (useful if main is deployed automatically to staging)
  # push:
  #   branches:
  #     - main

  # Uncomment to run automatically when another workflow (e.g. a deploy
  # workflow) sends a repository_dispatch event with type "staging-deployed"
  # repository_dispatch:
  #   types: [staging-deployed]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: e2e
        env:
          BEACON2_BASE_URL:             ${{ secrets.BEACON2_BASE_URL }}
          BEACON2_API_URL:              ${{ secrets.BEACON2_API_URL }}
          BEACON2_SYSADMIN_USERNAME:    ${{ secrets.BEACON2_SYSADMIN_USERNAME }}
          BEACON2_SYSADMIN_PASSWORD:    ${{ secrets.BEACON2_SYSADMIN_PASSWORD }}
          BEACON2_TEST_ADMIN_PASSWORD:  ${{ secrets.BEACON2_TEST_ADMIN_PASSWORD }}
          # Optional overrides — leave unset to use the defaults in global-setup.js
          BEACON2_TEST_TENANT_SLUG:     ${{ secrets.BEACON2_TEST_TENANT_SLUG }}
          BEACON2_TEST_TENANT_NAME:     ${{ secrets.BEACON2_TEST_TENANT_NAME }}
          BEACON2_TEST_ADMIN_USERNAME:  ${{ secrets.BEACON2_TEST_ADMIN_USERNAME }}
          BEACON2_TEST_ADMIN_NAME:      ${{ secrets.BEACON2_TEST_ADMIN_NAME }}
          BEACON2_TEST_ADMIN_EMAIL:     ${{ secrets.BEACON2_TEST_ADMIN_EMAIL }}
        run: npm test

      # Always upload the HTML report so you can inspect failures even when
      # the job is marked red.  Download it from the run's "Artifacts" section.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      # Also upload raw test results (screenshots, traces, videos) on failure
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 7
